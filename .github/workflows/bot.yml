name: Mass Bot Join

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  bots:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Dependencies
        run: npm install
      
      - name: Run Mass Bot Join
        run: node bot.js    # ✅ YEH CHANGE KARO!
