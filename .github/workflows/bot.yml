name: Proxy Mastermind Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      bot_count:
        description: 'Number of bots'
        type: number
        default: 50

jobs:
  bots:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Dependencies
        run: npm install
      
      - name: Run Proxy Bot
        run: node bot.js
        env:
          BOT_COUNT: ${{ github.event.inputs.bot_count || 50 }}
